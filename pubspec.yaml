name: pos_system
description: "Restaurant POS System (Flutter + PocketBase)"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # STATE MANAGEMENT
  provider: ^6.1.2

  # POCKETBASE
  pocketbase: ^0.21.0

  cached_network_image: ^3.3.1
  sqflite: ^2.3.3
  path: ^1.9.0
  connectivity_plus: ^6.0.5
  uuid: ^4.5.1
  image: ^4.3.0
  intl: ^0.19.0
  fl_chart: ^0.70.0
  image_picker: ^1.1.2
  pdf: ^3.11.1
  printing: ^5.13.4
  shared_preferences: ^2.5.3  
  url_launcher: ^6.3.1
  font_awesome_flutter: ^10.8.0
  badges: ^3.2.0
  # keyboard 
  hotkey_manager: ^0.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/products.json
